services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    ports:
      - "3080:3080"
    env_file: .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - librechat-images:/app/client/public/images
      - librechat-logs:/app/api/logs
    depends_on:
      - mongo
    networks:
      - vivian
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    networks:
      - vivian
    restart: unless-stopped

networks:
  vivian:
    driver: bridge

volumes:
  mongo-data:
  librechat-images:
  librechat-logs:
